# Stack de produção — `docker compose up -d --build`
#
# Serviços:
#   api        → Fastify (clandestino-api:3000, rede clandestino)
#   web-build  → build one-shot do PWA → ${CLANDESTINO_WEB_ROOT:-./srv/clandestino}
#
# Caddy é EXTERNO a este compose. Monte o mesmo caminho no Caddy:
#   ${CLANDESTINO_WEB_ROOT}:/srv/clandestino:ro
# Fragmento: docker/caddy/Caddyfile.prod.external

name: clandestino

networks:
  proxy:
    external: true

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: clandestino-api
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/clandestino.db
      API_HOST: 0.0.0.0
      API_PORT: '3000'
      NODE_ENV: production
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
      ORGANIZER_ALLOWED_EMAILS: ${ORGANIZER_ALLOWED_EMAILS:-organizador@gmail.com}
      EMAIL_FROM: ${EMAIL_FROM:-admin@sistema.pro.br}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Clandestino - Tênis de Mesa}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY é obrigatória em produção}
      SEED_ON_START: 'false'
    volumes:
      - ./data:/app/data
    networks:
      - proxy

  web-build:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: export
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SHOW_PLAYER_SHUFFLE: ${VITE_SHOW_PLAYER_SHUFFLE:-}
    image: clandestino-web-build
    container_name: clandestino-web-build
    restart: 'no'
    volumes:
      - ${CLANDESTINO_WEB_ROOT:-./srv/clandestino}:/out
    entrypoint: ['/bin/sh', '-c']
    command:
      - cp -a /dist/. /out/
