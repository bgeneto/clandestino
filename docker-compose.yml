name: clandestino

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: clandestino-api
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/clandestino.db
      API_HOST: 0.0.0.0
      API_PORT: '3000'
      NODE_ENV: production
      PUBLIC_APP_URL: http://localhost:5173
      ORGANIZER_ALLOWED_EMAILS: ${ORGANIZER_ALLOWED_EMAILS:-organizador@gmail.com}
      # Defina como "true" apenas em ambiente local para popular dados de exemplo.
      SEED_ON_START: 'false'
    ports:
      - '3000:3000'
    volumes:
      - clandestino-data:/app/data

volumes:
  clandestino-data:
