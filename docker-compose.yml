name: clandestino

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: clandestino-api
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/clandestino.db
      API_HOST: 0.0.0.0
      API_PORT: '3000'
      NODE_ENV: production
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5173}
      ORGANIZER_ALLOWED_EMAILS: ${ORGANIZER_ALLOWED_EMAILS:-organizador@gmail.com}
      EMAIL_FROM: ${EMAIL_FROM:-admin@sistema.pro.br}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Clandestino - Tênis de Mesa}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY é obrigatória em produção}
      # Defina como "true" apenas em ambiente local para popular dados de exemplo.
      SEED_ON_START: 'false'
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    networks:
      - proxy

  # Build one-off do PWA (não sobe em `docker compose up`). Usado por ./start prod.
  web-build:
    profiles: [web-build]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: export
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SHOW_PLAYER_SHUFFLE: ${VITE_SHOW_PLAYER_SHUFFLE:-}
    image: clandestino-web-build
    volumes:
      - ./apps/web/dist:/out
    entrypoint: ['/bin/sh', '-c']
    command:
      - cp -a /dist/. /out/
    networks:
      - proxy

networks:
  proxy:
    external: true
